name: Run Java Program

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Compile Java
        run: |
          for file in *.java; do
            if grep -l "extends Applet\|import java.applet" "$file"; then
              echo "Skipping applet: $file"
            else
              javac "$file"
            fi
          done

      - name: Run Programs
        run: |
          for file in program*.java
          do
            classname=$(basename $file .java)
            echo "Running $classname"
            java $classname
          done